name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  dotnet:
    name: .NET Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore OpsFlow.sln

      - name: Build
        run: dotnet build OpsFlow.sln --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test OpsFlow.Tests.Unit --no-build --configuration Release --logger "trx;LogFileName=unit.trx"

      - name: Integration tests
        run: dotnet test OpsFlow.Tests.Integration --no-build --configuration Release --logger "trx;LogFileName=integration.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: backend/**/*.trx

  angular:
    name: Angular Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (affected)
        run: npx nx affected --target=lint --base=origin/main --head=HEAD --parallel=3

      - name: Test (affected)
        run: npx nx affected --target=test --base=origin/main --head=HEAD --parallel=3 --ci

      - name: Build field-pwa
        run: npx nx build field-pwa --configuration=production

      - name: Build dashboard
        run: npx nx build dashboard --configuration=production
