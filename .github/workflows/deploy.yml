name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: 20
  # Live Azure Container App backend. Update here if the backend is ever moved/redeployed
  # under a different FQDN — this is the single place both frontend deploy jobs read it from.
  API_ORIGIN: https://opsflow-app.ambitiousplant-226f55e6.westus2.azurecontainerapps.io

jobs:
  deploy-field-pwa:
    name: Deploy field-pwa → Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npx nx build field-pwa --configuration=production

      # nx build always resets env.js's apiOrigin to '' (its committed dev default) — patch it
      # to the live backend before deploying, or the deployed app silently can't reach the API.
      - name: Patch API origin
        run: |
          sed -i "s#apiOrigin: ''#apiOrigin: '${{ env.API_ORIGIN }}'#" dist/apps/field-pwa/browser/env.js
          grep apiOrigin dist/apps/field-pwa/browser/env.js

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_FIELD_PWA }}
          vercel-args: --prod
          working-directory: frontend/dist/apps/field-pwa/browser

  deploy-dashboard:
    name: Deploy dashboard → Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npx nx build dashboard --configuration=production

      # nx build always resets env.js's apiOrigin to '' (its committed dev default) — patch it
      # to the live backend before deploying, or the deployed app silently can't reach the API.
      - name: Patch API origin
        run: |
          sed -i "s#apiOrigin: ''#apiOrigin: '${{ env.API_ORIGIN }}'#" dist/apps/dashboard/browser/env.js
          grep apiOrigin dist/apps/dashboard/browser/env.js

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}
          vercel-args: --prod
          working-directory: frontend/dist/apps/dashboard/browser

  # Backend API deploys separately to Azure Container Apps (manual: build image in ACR, then
  # update the container app by image digest — see docs/product for the current runbook).
