<router-outlet></router-outlet>

@if (currentUser() && isManager()) {
  <button class="global-fab" (click)="openFab()" aria-label="Create new">
    <span class="global-fab__icon">+</span>
  </button>

  @if (fabOpen()) {
    <div class="fab-backdrop" role="presentation" (click)="closeFab()"></div>
    <div class="fab-sheet">
      <div class="fab-sheet__header">
        <span class="fab-sheet__title">What would you like to create?</span>
        <button class="fab-sheet__close" (click)="closeFab()">&#10005;</button>
      </div>
      <div class="fab-sheet__body">
        <lib-type-selector (typeSelected)="onTypeSelected($event)" />
      </div>
    </div>
  }
}
