<div class="login-container">
  <div class="login-card">
    <div class="brand">
      <span class="brand-mark"><em>O</em></span>
      <span class="brand-name">OpsFlow</span>
      <span class="brand-tag">Field</span>
    </div>

    <span class="login-eyebrow">Staff Portal</span>
    <h1 class="login-title">Welcome<br><em>back.</em></h1>
    <p class="login-subtitle">Sign in to see your store's tasks and checklists.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">Email address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          inputmode="email"
          placeholder="you@example.com"
          [attr.aria-invalid]="email.invalid && email.touched ? 'true' : null"
        />
        @if (email.invalid && email.touched) {
          <span class="error-text">Enter a valid email address.</span>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
          [attr.aria-invalid]="password.invalid && password.touched ? 'true' : null"
        />
        @if (password.invalid && password.touched) {
          <span class="error-text">Password is required.</span>
        }
      </div>

      @if (errorMessage()) {
        <div class="error-banner" role="alert">{{ errorMessage() }}</div>
      }

      <button type="submit" [disabled]="loading()" class="submit-btn">
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
          Signing in…
        } @else {
          Sign in ↗
        }
      </button>
    </form>
  </div>
</div>
