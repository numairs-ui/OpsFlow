<div class="shell">
  <nav class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__logo">OpsFlow</span>
      <span class="sidebar__role">Supervisor</span>
    </div>

    <ul class="sidebar__nav">
      <li class="sidebar__section-label">My Region</li>
      <li>
        <a routerLink="overview" routerLinkActive="active" class="sidebar__link">Regional Dashboard</a>
      </li>
      <li class="sidebar__section-label">Tasks</li>
      <li>
        <a routerLink="tasks" routerLinkActive="active" class="sidebar__link">Task List</a>
      </li>
      <li>
        <a routerLink="create-task" routerLinkActive="active" class="sidebar__link">New Task</a>
      </li>
      <li>
        <a routerLink="recurring" routerLinkActive="active" class="sidebar__link">Recurring Assignments</a>
      </li>
      <li class="sidebar__section-label">Performance</li>
      <li>
        <a routerLink="checklist-completions" routerLinkActive="active" class="sidebar__link">Checklists</a>
      </li>
      <li>
        <a routerLink="recurring-performance" routerLinkActive="active" class="sidebar__link">Recurring</a>
      </li>
      <li class="sidebar__section-label">Forms</li>
      <li>
        <a routerLink="submissions" routerLinkActive="active" class="sidebar__link">Forms</a>
      </li>
    </ul>

    <div class="sidebar__footer">
      <div class="sidebar__user-info">
        <span class="sidebar__user-name">{{ user()?.email ?? user()?.sub }}</span>
        <span class="sidebar__user-role">{{ roleLabel(user()?.role) }}</span>
      </div>
      <button class="sidebar__logout" (click)="onLogout()">Sign out</button>
    </div>
  </nav>

  <main class="shell__content">
    <router-outlet />
  </main>

  <!-- Mobile bottom tab bar — hidden at desktop widths, see supervisor-shell.component.scss -->
  <nav class="tabbar">
    <a routerLink="overview" routerLinkActive="active" class="tabbar__link">
      <app-nav-icon name="overview" />
      <span>Dashboard</span>
    </a>
    <a routerLink="tasks" routerLinkActive="active" class="tabbar__link">
      <app-nav-icon name="tasks" />
      <span>Tasks</span>
    </a>
    <a routerLink="checklist-completions" routerLinkActive="active" class="tabbar__link">
      <app-nav-icon name="checklists" />
      <span>Checklists</span>
    </a>
    <a routerLink="recurring-performance" routerLinkActive="active" class="tabbar__link">
      <app-nav-icon name="recurring" />
      <span>Recurring</span>
    </a>
    <a routerLink="submissions" routerLinkActive="active" class="tabbar__link">
      <app-nav-icon name="submissions" />
      <span>Forms</span>
    </a>
  </nav>
</div>
