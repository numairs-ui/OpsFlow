<div class="shell">
  <nav class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__logo">OpsFlow</span>
      <span class="sidebar__role">Supervisor</span>
    </div>

    <ul class="sidebar__nav">
      <li class="sidebar__section-label">My Region</li>
      <li>
        <a routerLink="overview" routerLinkActive="active" class="sidebar__link">
          <span class="sidebar__icon" aria-hidden="true">&#9679;</span> Regional Dashboard
        </a>
      </li>
      <li class="sidebar__section-label">Forms</li>
      <li>
        <a routerLink="submissions" routerLinkActive="active" class="sidebar__link">
          <span class="sidebar__icon" aria-hidden="true">&#9679;</span> Form Submissions
        </a>
      </li>
    </ul>

    <div class="sidebar__footer">
      <div class="sidebar__user-info">
        <span class="sidebar__user-name">{{ user()?.displayName }}</span>
        <span class="sidebar__user-role">{{ roleLabel(user()?.role) }}</span>
      </div>
      <button class="sidebar__logout" (click)="onLogout()">Sign out</button>
    </div>
  </nav>

  <main class="shell__content">
    <router-outlet />
  </main>
</div>
