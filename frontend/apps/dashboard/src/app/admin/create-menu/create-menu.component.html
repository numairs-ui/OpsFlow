<div class="create-scrim" role="presentation" (click)="close()"></div>
<div class="create-modal" role="dialog" aria-modal="true" aria-label="Create new">
  <div class="create-modal__header">
    <h2>Create</h2>
    <button class="create-modal__close" (click)="close()" aria-label="Close">&#10005;</button>
  </div>
  <div class="create-grid">
    @for (opt of options; track opt.route) {
      <button class="create-tile" (click)="choose(opt)">
        <span class="create-tile__icon">{{ opt.icon }}</span>
        <span class="create-tile__label">{{ opt.label }}</span>
        <span class="create-tile__desc">{{ opt.desc }}</span>
      </button>
    }
  </div>
</div>
